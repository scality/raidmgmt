linters:
  disable-all: true
  enable:
  # metalinters
  - revive
  - govet
  - staticcheck
  # format & style
  - asciicheck                # detect non-ASCII characters on identifiers
  - dupword                   # detect duplicated words in comments
  - gofumpt                   # enhanced formatter
  - godot                     # ensure that commets will end with a period
  #- godox                     # detect FIXME, TODO, etc. comments -> Disable for the moment for dev
  - goimports                 # format and fix imports
  - lll                       # long line length detection
  - tagalign                  # align struct tags
  - tagliatelle               # check struct tags naming
  - whitespace                # leading and trailing whitespace detection
  - wsl                       # empty lines guidelines
  # correctness & bug prevention -> error handling
  - errcheck                  # detect unchecked errors
  - errname                   # enforce error vars to start with Err and error types to end with Error
  - errorlint                 # look for error wrapping inconsistences
  - err113                    # enforce usage of errors.Is() and errors.As()
  - nilerr                    # prevent to mask errors
  - wrapcheck                 # check errors wrapping
  # correctness & bug prevention -> constants, variables, parameters and assignments
  - asasalint                 # prevent to use `any` as variadic argument
  - durationcheck             # enforce time.Duration consistent use
  - forcetypeassert           # force type assertions when usinmg interface{} os `any` variables values
  - gochecknoglobals          # look for global variables
  - ineffassign               # detect ineffectual assignments
  - nilnil                    # prevent functions to return value = nil, err = nil
  - predeclared               # detect shadowing of predeclared identifiers
  - unparam                   # detect unused function parameters
  - unused                    # detect unused constants, variables, functions and types
  - usestdlibvars             # detect constants that can be replaced with their stdlib counterparts
  # correctness & bug prevention -> context.Context
  - containedctx              # detect structures that store context.Context
  - contextcheck              # detect context.Context misuse
  # correctness & bug prevention -> misc
  - bidichk                   # detect some unsafe unicode sequences
  - dogsled                   # detect abuse of blank identifiers
  - exhaustive                # check enum switches to be exhaustive
  #- exhaustruct               # ensures all struct fields to be initialized -> may not really make sense in some situation
  - ginkgolinter              # detect some common Ginkgo antipatterns / to use only with tests
  - gocheckcompilerdirectives # detect some common compiler directives antipatterns
  - gochecknoinits            # look for init functions
  - gosec                     # check for common security issues
  #- nolintlint               # report abuses of //nolint directives # Conflict with gofumpt
  # Performance
  #- aligncheck               # check for struct misalignment -> it's a operator so readability and maintainability are more important then small performance twiks
  - makezero                  # detect preallocation mishandles
  - prealloc                  # detect slice declarations that could potentially be preallocated
  # complexity & maintainability
  - cyclop                    # calculates and limits cyclomatic complexity of code
  - gosimple                  # suggest simplifications in code
  - dupl                      # finds and reports code duplications
  - funlen                    # limit the number of lines and statements in a function
  - gocognit                  # calculates and limits the cognitive complexity of code
  - goconst                   # finds repeated strings that could be replaced by a constant
  - mnd                       # detect magic numbers that should be named constants
  - ireturn                   # ensure that methods will accept interfaces and return concrete types
  - nestif                    # detect nested ifs and limits their depths
  - unconvert                 # finds unnecessary type conversions

linters-settings:
  # ---------- REVIVE METALINTER ---------- #
  revive:
    max-open-files: 2048
    ignore-generated-header: true
    severity: warning
    confidence: 0.2
    warning-code: 101
    error-code: 102
    enable-all-rules: false
    rules:
      # https://github.com/mgechev/revive/blob/master/RULES_DESCRIPTIONS.md#add-constant
      - name: add-constant
        severity: warning
        disabled: true # replaced by gomnd
        #arguments:
        #  - maxLitCount: "2"
        #    allowInts: "-1,0,1"
        #    #allowStrs: '""'
        #    #allowFloats: "0.0,0.,1.0,1.,2.0,2."
      # https://github.com/mgechev/revive/blob/master/RULES_DESCRIPTIONS.md#argument-limit
      - name: argument-limit
        severity: warning
        disabled: false
        arguments:
          - 4 # consider to create a struct to pass more than 4 arguments to a function/method
      # https://github.com/mgechev/revive/blob/master/RULES_DESCRIPTIONS.md#atomic
      - name: atomic
        severity: warning
        disabled: false
      # https://github.com/mgechev/revive/blob/master/RULES_DESCRIPTIONS.md#banned-characters
      - name: banned-characters
        disabled: true
      # https://github.com/mgechev/revive/blob/master/RULES_DESCRIPTIONS.md#bare-return
      - name: bare-return
        severity: error
        disabled: false
      # https://github.com/mgechev/revive/blob/master/RULES_DESCRIPTIONS.md#blank-imports
      - name: blank-imports
        severity: warning
        disabled: false
      # https://github.com/mgechev/revive/blob/master/RULES_DESCRIPTIONS.md#bool-literal-in-expr
      - name: bool-literal-in-expr
        severity: warning
        disabled: false
      # https://github.com/mgechev/revive/blob/master/RULES_DESCRIPTIONS.md#call-to-gc
      - name: call-to-gc
        severity: error
        disabled: false
      # https://github.com/mgechev/revive/blob/master/RULES_DESCRIPTIONS.md#cognitive-complexity
      - name: cognitive-complexity
        severity: error
        disabled: true # replaced by gocognit
        #arguments:
        #  - 5
      # https://github.com/mgechev/revive/blob/master/RULES_DESCRIPTIONS.md#comment-spacings
      - name: comment-spacings
        severity: warning
        disabled: false
        arguments:
          - nolint
          - +kubebuilder
      # https://github.com/mgechev/revive/blob/master/RULES_DESCRIPTIONS.md#confusing-naming
      - name: confusing-naming
        severity: error
        disabled: false
      # https://github.com/mgechev/revive/blob/master/RULES_DESCRIPTIONS.md#confusing-results
      - name: confusing-results
        severity: error
        disabled: false
      # https://github.com/mgechev/revive/blob/master/RULES_DESCRIPTIONS.md#constant-logical-expr
      - name: constant-logical-expr
        severity: error
        disabled: false
      # https://github.com/mgechev/revive/blob/master/RULES_DESCRIPTIONS.md#context-as-argument
      - name: context-as-argument
        severity: error
        disabled: false
      # https://github.com/mgechev/revive/blob/master/RULES_DESCRIPTIONS.md#context-keys-type
      - name: context-keys-type
        severity: error
        disabled: false
      # https://github.com/mgechev/revive/blob/master/RULES_DESCRIPTIONS.md#cyclomatic
      - name: cyclomatic
        severity: error
        disabled: true # replaced by cyclop
        #arguments:
        #  - 10
      # https://github.com/mgechev/revive/blob/master/RULES_DESCRIPTIONS.md#datarace
      - name: datarace
        severity: error
        disabled: false
      # https://github.com/mgechev/revive/blob/master/RULES_DESCRIPTIONS.md#deep-exit
      - name: deep-exit
        severity: error
        disabled: false
      # https://github.com/mgechev/revive/blob/master/RULES_DESCRIPTIONS.md#defer
      - name: defer
        severity: warning
        disabled: false
        arguments: 
          - ["call-chain", "loop", "method-call", "recover", "immediate-recover", "return"]
      # https://github.com/mgechev/revive/blob/master/RULES_DESCRIPTIONS.md#dot-imports
      - name: dot-imports
        severity: warning
        disabled: false
      # https://github.com/mgechev/revive/blob/master/RULES_DESCRIPTIONS.md#duplicated-imports
      - name: duplicated-imports
        severity: error
        disabled: false
      # https://github.com/mgechev/revive/blob/master/RULES_DESCRIPTIONS.md#early-return
