        disabled: false
      # https://github.com/mgechev/revive/blob/master/RULES_DESCRIPTIONS.md#unconditional-recursion
      - name: unconditional-recursion
        severity: error
        disabled: false
      # https://github.com/mgechev/revive/blob/master/RULES_DESCRIPTIONS.md#unexported-naming
      - name: unexported-naming
        severity: warning
        disabled: false
      # https://github.com/mgechev/revive/blob/master/RULES_DESCRIPTIONS.md#unexported-return
      - name: unexported-return
        severity: error
        disabled: false
      # https://github.com/mgechev/revive/blob/master/RULES_DESCRIPTIONS.md#unhandled-error
      - name: unhandled-error
        severity: error
        disabled: false
        arguments:
          - "fmt.Printf"
      # https://github.com/mgechev/revive/blob/master/RULES_DESCRIPTIONS.md#unnecessary-stmt
      - name: unnecessary-stmt
        severity: error
        disabled: false
      # https://github.com/mgechev/revive/blob/master/RULES_DESCRIPTIONS.md#unreachable-code
      - name: unreachable-code
        severity: error
        disabled: false
      # https://github.com/mgechev/revive/blob/master/RULES_DESCRIPTIONS.md#unused-parameter
      - name: unused-parameter
        severity: error
        disabled: false
      # https://github.com/mgechev/revive/blob/master/RULES_DESCRIPTIONS.md#unused-receiver
      - name: unused-receiver
        severity: warning
        disabled: false
      # https://github.com/mgechev/revive/blob/master/RULES_DESCRIPTIONS.md#use-any
      - name: use-any
        severity: error
        disabled: false
      # https://github.com/mgechev/revive/blob/master/RULES_DESCRIPTIONS.md#useless-break
      - name: useless-break
        severity: error
        disabled: false
      # https://github.com/mgechev/revive/blob/master/RULES_DESCRIPTIONS.md#waitgroup-by-value
      - name: waitgroup-by-value
        severity: error
        disabled: false
  # ---------- GOVET METALINTER ---------- #
  govet:
    enable-all: true
    disable:
      - fieldalignment # once it is a operator, readability and maintainability are more important then small performance twiks
  # ---------- STATICCHECK METALINTER ---------- #
  staticcheck:
    checks: ["all"]
  # ---------- SPECIFIC LINTERS ---------- #
  cyclop:
    max-complexity: 10
    package-average: 5
    skip-tests: false
  funlen:
    lines: 50
    statements: 25
  gocognit:
    min-complexity: 10 # minimal complexity before fail
  gofumpt:
    extra-rules: true
  goimports:
    local-prefixes: github.com/scality/artesca
  gomnd:
    checks:
      - argument
      - case
      - condition
      - operation
      - return
      - assign
    ignored-numbers:
      - '-1'
      - '0'
      - '1'
    #ignored-files:
    #  - 'magic1_.+\.go$'
    #ignored-functions:
    #  - '^math\.'
    #  - '^http\.StatusText$'
  errcheck:
    check-type-assertions: true
    check-blank: true
  goconst:
    min-len: 1
    min-occurrences: 3
    numbers: true
  lll:
    line-length: 100
  nolintlint:
    require-specific: false
    require-explanation: true

issues:
  fix: true
  max-issues-per-linter: 0
  max-same-issues: 0

  exclude-rules:
    - path: _test\.go
      linters: &_exclude_test
        - funlen
        - gochecknoglobals
        - revive
        - gomnd
        - goerr113
        - gocognit
        - lll
        - nilnil
        - forcetypeassert
        - errcheck
        - cyclop
        - wrapcheck
        - gosec
        - goconst
    - path: /tests/
      linters: *_exclude_test
    - path: ^tests/
      linters: *_exclude_test

    - text: 'declaration of "(err|ctx)" shadows declaration at'
      linters:
        - govet

severity:
  default-severity: warning

run:
  go: '1.23'
  timeout: 10m
  issues-exit-code: 100
  tests: true
